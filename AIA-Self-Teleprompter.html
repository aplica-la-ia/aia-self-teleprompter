<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" href="logo.png">
    
    <title>Smart Segment Prompter - Aplica la IA</title>
    <style>
        :root {
            --bg-main: #181818; --bg-panel: #252525; --bg-input: #1e1e1e;
            --text-main: #e0e0e0; --accent-color: #6200ea; --accent-hover: #7c4dff;
            --border-color: #333333; --danger: #cf6679;
        }

        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-main); color: var(--text-main); height: 100vh; overflow: hidden; }

        #setup-view { display: flex; height: 100vh; width: 100vw; }
        .document-panel { flex: 6; padding: 30px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }

        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-right { display: flex; align-items: center; gap: 8px; }

        .logo-link img { height: 40px; width: 40px; border-radius: 8px; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .logo-link img:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(98, 0, 234, 0.5); }

        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .btn-custom-file { background-color: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 4px; font-weight: bold; display: inline-block; cursor: pointer; transition: border 0.2s; }
        .file-upload-wrapper:hover .btn-custom-file { border-color: var(--accent-color); }
        #file-name-display { color: #aaa; font-size: 14px; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        .icon-btn { background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); font-size: 16px; width: 36px; height: 36px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;}
        .icon-btn:hover { border-color: var(--text-main); background: var(--border-color);}

        .global-stats { font-size: 14px; color: #aaa; background: var(--bg-panel); padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border-color);}

        #text-container {
            flex-grow: 1; font-size: 18px; line-height: 1.2; white-space: pre-wrap; padding: 20px;
            background: var(--bg-panel); border: 2px dashed var(--border-color); border-radius: 4px;
            overflow-y: auto; cursor: text; outline: none; transition: background 0.2s, border-color 0.2s;
        }
        #text-container:focus { border-color: #555; }
        #text-container.dragover { background: #2a2a35; border-color: var(--accent-color); }

        .highlight { border-radius: 3px; padding: 0 2px; font-weight: bold; color: #fff; display: inline; }
        .highlight::before { content: "["; color: #fff; opacity: 0.5; font-weight: normal; margin-right: 2px;}
        .highlight::after { content: "]"; color: #fff; opacity: 0.5; font-weight: normal; margin-left: 2px;}

        .sidebar-panel { flex: 4; display: flex; flex-direction: column; padding: 20px; background-color: var(--bg-main); }
        .sidebar-header { margin-bottom: 15px; }
        #btn-start { display: none; margin-top: 15px; width: 100%; background-color: var(--accent-color); color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #btn-start:hover { background-color: var(--accent-hover); }
        #cards-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }

        .card-item { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 6px; padding: 10px; display: flex; flex-direction: column; cursor: grab; }
        .card-item:active { cursor: grabbing; border-color: var(--accent-color); }
        .card-item.drag-over { border-top: 3px solid var(--accent-color); }
        .card-item textarea { background: transparent; color: var(--text-main); border: none; resize: vertical; min-height: 60px; font-family: inherit; font-size: 14px; outline: none; margin-bottom: 5px; }
        .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #888; border-top: 1px solid var(--border-color); padding-top: 8px; }
        .btn-delete { background-color: rgba(207, 102, 121, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-weight: bold; transition: all 0.2s;}
        .btn-delete:hover { background-color: var(--danger); color: white; }

        #prompter-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000000; color: #ffffff; z-index: 9999; }
        #prompter-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 8vh; font-weight: 600; line-height: 1.3; width: 80%; text-align: center; outline: none; }

        .touch-zone { position: absolute; top: 0; bottom: 0; width: 4.5%; z-index: 10000; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: rgba(255, 255, 255, 0.02); color: rgba(255, 255, 255, 0.15); font-size: 30px; font-weight: bold; transition: all 0.2s; user-select: none; }
        .touch-zone:hover { background-color: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.5); }
        #zone-left { left: 0; } #zone-right { right: 0; }
        
        .zone-btn-top { position: absolute; width: 40px; height: 40px; background: rgba(40, 40, 40, 0.5); border: 1px solid #555; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 18px; z-index: 10002; transition: background 0.2s; }
        .zone-btn-top:hover { background: rgba(80, 80, 80, 0.8); }
        
        #btn-exit-prompter { top: 20px; }
        #btn-menu-prompter { top: 20px; }
        #btn-font-prompter { top: 75px; font-family: serif; font-weight: bold; font-size: 16px; }

        #font-slider-panel { display: none; position: absolute; top: 75px; right: 5vw; background: rgba(30, 30, 30, 0.95); border: 1px solid #444; border-radius: 8px; padding: 15px 20px; z-index: 10005; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; gap: 10px; color: #ccc; font-size: 2vh; font-weight: bold; }
        input[type="range"] { accent-color: var(--accent-color); cursor: pointer; width: 120px; }

        #progress-indicator { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 2vh; color: rgba(255,255,255,0.3); font-weight: bold; pointer-events: none; z-index: 10001;}

        #jump-menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 10005; align-items: center; justify-content: center; flex-direction: column; }
        .jump-menu-container { width: 80%; max-width: 600px; max-height: 80vh; background: var(--bg-panel); border: 1px solid #444; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        .jump-header { padding: 15px 20px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 18px;}
        .btn-close-menu { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .jump-list-content { overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .jump-item { padding: 12px 15px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; display: flex; gap: 15px; align-items: center; transition: all 0.2s;}
        .jump-item:hover { background: #333; border-color: var(--accent-color); }
        .jump-num { font-weight: bold; color: var(--accent-color); min-width: 25px;}
        .jump-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ccc; font-size: 15px;}

        .c0 { background-color: rgba(46, 125, 50, 0.4); } .c1 { background-color: rgba(21, 101, 192, 0.4); } 
        .c2 { background-color: rgba(173, 20, 87, 0.4); } .c3 { background-color: rgba(239, 108, 0, 0.4); } 
        
        #autosave-indicator { position: fixed; bottom: 10px; left: 10px; font-size: 12px; color: #888; opacity: 0; transition: opacity 0.5s; z-index: 1000;}
    </style>
</head>
<body>

    <div id="setup-view">
        <div class="document-panel">
            <div class="header-controls">
                <div class="header-left">
                    <a href="https://www.youtube.com/channel/UCsLbSODWnK5I896EToRb12Q" target="_blank" title="Visitar Aplica la IA" class="logo-link">
                        <img src="logo.png" alt="Aplica la IA">
                    </a>
                    <div class="file-upload-wrapper">
                        <div class="btn-custom-file" title="Carga un TXT nuevo o un proyecto JSON guardado">📄 Seleccionar o arrastrar</div>
                        <input type="file" id="file-input" accept=".txt,.json">
                    </div>
                    <span id="file-name-display">Ningún archivo cargado</span>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="btn-undo" title="Deshacer edición (Ctrl+Z)">↩️</button>
                    <button class="icon-btn" id="btn-save" title="Guardar Proyecto Como... (.json)">💾</button>
                    <button class="icon-btn" id="btn-refresh" title="Recargar texto original (Borra selecciones)">🔄</button>
                    <button class="icon-btn" id="btn-clear" title="Limpiar todo (Borra el autoguardado)">🗑️</button>
                    <div class="global-stats" id="global-stats-header">0 car. | ~0s</div>
                </div>
            </div>
            <div id="text-container" contenteditable="true" spellcheck="false">Arrastra aquí tu archivo .txt o tu proyecto .json para empezar...</div>
        </div>

        <div class="sidebar-panel">
            <div class="sidebar-header">
                <h3 style="margin: 0 0 10px 0;">Tarjetas Generadas</h3>
                <div class="global-stats" id="global-stats-sidebar">Tarjetas: 0</div>
                <button id="btn-start">▶ Iniciar Modo Grabación</button>
            </div>
            <div id="cards-list"></div>
        </div>
    </div>

    <div id="prompter-view">
        <div class="touch-zone" id="zone-left" title="Atrás (Click)">
            <div class="zone-btn-top" id="btn-exit-prompter" title="Salir de grabación">✖</div>
            &lt;
        </div>
        <div id="prompter-text" contenteditable="true" spellcheck="false"></div>
        <div id="progress-indicator"></div>
        <div class="touch-zone" id="zone-right" title="Siguiente (Click)">
            <div class="zone-btn-top" id="btn-menu-prompter" title="Lista de tarjetas">☰</div>
            <div class="zone-btn-top" id="btn-font-prompter" title="Tamaño de texto">Aa</div>
            &gt;
        </div>
        
        <div id="font-slider-panel">
            A- <input type="range" id="font-size-slider" min="4" max="15" step="0.5" value="8"> A+
        </div>
    </div>

    <div id="jump-menu-overlay">
        <div class="jump-menu-container">
            <div class="jump-header"><span>Selecciona una tarjeta para saltar</span><button class="btn-close-menu" id="btn-close-jump">✖</button></div>
            <div class="jump-list-content" id="jump-list-content"></div>
        </div>
    </div>
    <div id="autosave-indicator">Guardado automáticamente ✓</div>

    <script>
        let cardsData = [];
        let currentCardIndex = 0;
        let colorIndex = 0;
        const WPM = 130; 
        let draggedCardId = null;
        let originalTextContent = ""; 

        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name-display');
        const textContainer = document.getElementById('text-container');
        const cardsList = document.getElementById('cards-list');
        const btnStart = document.getElementById('btn-start');
        const statsHeader = document.getElementById('global-stats-header');
        const statsSidebar = document.getElementById('global-stats-sidebar');
        const setupView = document.getElementById('setup-view');
        const prompterView = document.getElementById('prompter-view');
        const prompterText = document.getElementById('prompter-text');
        const progressIndicator = document.getElementById('progress-indicator');
        const fontSizeSlider = document.getElementById('font-size-slider');
        const jumpMenuOverlay = document.getElementById('jump-menu-overlay');
        const jumpListContent = document.getElementById('jump-list-content');
        const autosaveIndicator = document.getElementById('autosave-indicator');
        const fontSliderPanel = document.getElementById('font-slider-panel');

        function saveToLocal() {
            if (!textContainer.innerText.trim() && cardsData.length === 0) return; 
            const projectData = { fileName: fileNameDisplay.textContent, originalText: originalTextContent, currentHtml: textContainer.innerHTML, cards: cardsData, colorIndex: colorIndex };
            localStorage.setItem('prompterAutosave', JSON.stringify(projectData));
            autosaveIndicator.style.opacity = '1'; setTimeout(() => { autosaveIndicator.style.opacity = '0'; }, 1500);
        }

        function loadFromLocal() {
            const savedData = localStorage.getItem('prompterAutosave');
            if (savedData) {
                try {
                    const projectData = JSON.parse(savedData);
                    fileNameDisplay.textContent = projectData.fileName || "Proyecto Recuperado";
                    originalTextContent = projectData.originalText || ""; textContainer.innerHTML = projectData.currentHtml || "";
                    cardsData = projectData.cards || []; colorIndex = projectData.colorIndex || 0; renderSidebar();
                } catch (e) { console.warn("No se pudo recuperar el autoguardado."); }
            }
        }
        window.addEventListener('DOMContentLoaded', loadFromLocal);

        function loadFileContent(file) {
            if (!file) return;
            fileNameDisplay.textContent = file.name;
            const reader = new FileReader();

            if (file.name.endsWith('.json')) {
                reader.onload = function(e) {
                    try {
                        const projectData = JSON.parse(e.target.result);
                        originalTextContent = projectData.originalText || ""; textContainer.innerHTML = projectData.currentHtml || ""; 
                        cardsData = projectData.cards || []; colorIndex = projectData.colorIndex || 0;
                        renderSidebar(); saveToLocal(); 
                    } catch (error) { alert("Archivo corrupto o inválido."); }
                };
            } else {
                reader.onload = function(e) {
                    originalTextContent = e.target.result; textContainer.textContent = originalTextContent;
                    cardsData = []; cardsList.innerHTML = ''; colorIndex = 0; updateGlobalStats(); saveToLocal();
                };
            }
            reader.readAsText(file);
        }

        fileInput.addEventListener('change', (e) => loadFileContent(e.target.files[0]));
        textContainer.addEventListener('dragover', (e) => { e.preventDefault(); textContainer.classList.add('dragover'); });
        textContainer.addEventListener('dragleave', () => textContainer.classList.remove('dragover'));
        textContainer.addEventListener('drop', (e) => {
            e.preventDefault(); textContainer.classList.remove('dragover');
            if(e.dataTransfer.files.length > 0) loadFileContent(e.dataTransfer.files[0]);
        });

        document.getElementById('btn-save').addEventListener('click', async () => {
            if (!textContainer.innerText.trim() && cardsData.length === 0) return;
            const projectData = { originalText: originalTextContent, currentHtml: textContainer.innerHTML, cards: cardsData, colorIndex: colorIndex };
            const jsonStr = JSON.stringify(projectData, null, 2);
            let exportName = fileNameDisplay.textContent.replace('.txt', '').replace('.json', '');
            if (exportName === "Ningún archivo cargado" || exportName === "Proyecto Recuperado") exportName = "proyecto_prompter";

            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({ suggestedName: exportName + '.json', types: [{ description: 'Proyecto JSON', accept: {'application/json': ['.json']} }] });
                    const writable = await handle.createWritable(); await writable.write(jsonStr); await writable.close();
                } else {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(jsonStr);
                    const a = document.createElement('a'); a.href = dataStr; a.download = exportName + ".json";
                    document.body.appendChild(a); a.click(); a.remove();
                }
            } catch (error) {}
        });

        document.getElementById('btn-undo').addEventListener('click', () => { document.execCommand('undo'); updateGlobalStats(); saveToLocal(); });
        document.getElementById('btn-refresh').addEventListener('click', () => { if(originalTextContent) { textContainer.textContent = originalTextContent; cardsData = []; cardsList.innerHTML = ''; colorIndex = 0; updateGlobalStats(); saveToLocal(); } });
        document.getElementById('btn-clear').addEventListener('click', () => { originalTextContent = ""; fileInput.value = ""; fileNameDisplay.textContent = "Ningún archivo cargado"; textContainer.textContent = "Arrastra aquí tu archivo .txt o tu proyecto .json para empezar..."; cardsData = []; cardsList.innerHTML = ''; colorIndex = 0; updateGlobalStats(); localStorage.removeItem('prompterAutosave'); });

        textContainer.addEventListener('input', () => {
            updateGlobalStats();
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let node = selection.anchorNode;
                while (node && node !== textContainer) {
                    if (node.nodeName === 'MARK' && node.id.startsWith('mark-')) {
                        const cardId = parseInt(node.id.replace('mark-', ''));
                        const newText = node.innerText;
                        const cardIndex = cardsData.findIndex(c => c.id === cardId);
                        if (cardIndex > -1) {
                            cardsData[cardIndex].text = newText;
                            const textarea = document.querySelector(`textarea[data-id="${cardId}"]`);
                            if (textarea) {
                                textarea.value = newText;
                                const timeStr = calculateReadingTime(newText) + "s";
                                textarea.nextElementSibling.querySelector('span').textContent = `${newText.length} car. | ~${timeStr}`;
                            }
                        }
                        break; 
                    }
                    node = node.parentNode;
                }
            }
            saveToLocal();
        });

        textContainer.addEventListener('mouseup', function() {
            const selection = window.getSelection();
            if (selection.isCollapsed) return; 
            const selectedText = selection.toString().trim();
            if (selectedText.length === 0) return;

            const cardId = Date.now();
            const range = selection.getRangeAt(0);
            const markNode = document.createElement('mark');
            markNode.className = `highlight c${colorIndex % 4}`; markNode.id = `mark-${cardId}`; 
            try { markNode.appendChild(range.extractContents()); range.insertNode(markNode); } catch (e) { console.warn("Selección cruzada"); }

            cardsData.push({ id: cardId, text: selectedText });
            colorIndex++; selection.removeAllRanges(); 

            const markElements = Array.from(textContainer.querySelectorAll('mark.highlight'));
            const sortedCards = [];
            markElements.forEach(mark => {
                const id = parseInt(mark.id.replace('mark-', ''));
                const card = cardsData.find(c => c.id === id);
                if (card) sortedCards.push(card);
            });
            cardsData = sortedCards;

            renderSidebar(); saveToLocal(); 
        });

        function calculateReadingTime(text) { return Math.ceil((text.trim().split(/\s+/).length / WPM) * 60); }

        function updateGlobalStats() {
            const fullText = textContainer.innerText || "";
            const tSecsDoc = calculateReadingTime(fullText);
            const minDoc = Math.floor(tSecsDoc / 60); const secDoc = tSecsDoc % 60;
            const timeStrDoc = minDoc > 0 ? `${minDoc}m ${secDoc}s` : `${secDoc}s`;
            statsHeader.textContent = `${fullText.length} car. | ~${timeStrDoc}`;

            let totalCardsWords = 0; let totalCardsChars = 0;
            cardsData.forEach(card => { totalCardsChars += card.text.length; totalCardsWords += card.text.trim().split(/\s+/).length; });
            const tSecsCards = Math.ceil((totalCardsWords / WPM) * 60);
            const minCards = Math.floor(tSecsCards / 60); const secCards = tSecsCards % 60;
            const timeStrCards = minCards > 0 ? `${minCards}m ${secCards}s` : `${secCards}s`;
            
            statsSidebar.textContent = `Tarjetas: ${cardsData.length} | ${totalCardsChars} car. | ~${timeStrCards}`;
            btnStart.style.display = cardsData.length > 0 ? 'block' : 'none';
        }

        function renderSidebar() {
            cardsList.innerHTML = '';
            cardsData.forEach((card) => {
                const timeStr = calculateReadingTime(card.text) + "s";
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card-item'; cardDiv.draggable = true; cardDiv.dataset.id = card.id;
                cardDiv.innerHTML = `<textarea data-id="${card.id}" spellcheck="false">${card.text}</textarea><div class="card-meta"><span>${card.text.length} car. | ~${timeStr}</span><button class="btn-delete" onclick="deleteCard(${card.id})">Eliminar</button></div>`;

                cardDiv.addEventListener('dragstart', (e) => { draggedCardId = card.id; e.dataTransfer.effectAllowed = 'move'; });
                cardDiv.addEventListener('dragover', (e) => { e.preventDefault(); cardDiv.classList.add('drag-over'); });
                cardDiv.addEventListener('dragleave', () => cardDiv.classList.remove('drag-over'));
                cardDiv.addEventListener('drop', (e) => {
                    e.preventDefault(); cardDiv.classList.remove('drag-over');
                    const targetId = card.id; if (draggedCardId && draggedCardId !== targetId) swapCards(draggedCardId, targetId);
                });
                cardsList.appendChild(cardDiv);
            });
            updateGlobalStats();

            document.querySelectorAll('.card-item textarea').forEach(textarea => {
                textarea.addEventListener('input', function(e) {
                    const id = parseInt(e.target.getAttribute('data-id'));
                    const cardIndex = cardsData.findIndex(c => c.id === id);
                    if (cardIndex > -1) {
                        cardsData[cardIndex].text = e.target.value;
                        const timeStr = calculateReadingTime(e.target.value) + "s";
                        e.target.nextElementSibling.querySelector('span').textContent = `${e.target.value.length} car. | ~${timeStr}`;
                        const markNode = document.getElementById(`mark-${id}`);
                        if(markNode) markNode.innerText = e.target.value;
                        updateGlobalStats(); saveToLocal(); 
                    }
                });
            });
        }

        window.deleteCard = function(id) {
            cardsData = cardsData.filter(c => c.id !== id);
            const markNode = document.getElementById(`mark-${id}`);
            if(markNode) { const textNode = document.createTextNode(markNode.innerText); markNode.replaceWith(textNode); }
            renderSidebar(); saveToLocal(); 
        };

        function swapCards(idA, idB) {
            const indexA = cardsData.findIndex(c => c.id === idA); const indexB = cardsData.findIndex(c => c.id === idB);
            const tempCard = cardsData[indexA]; cardsData[indexA] = cardsData[indexB]; cardsData[indexB] = tempCard;
            const markA = document.getElementById(`mark-${idA}`); const markB = document.getElementById(`mark-${idB}`);
            if(markA && markB) { const tempNode = document.createTextNode(''); markA.before(tempNode); markB.before(markA); tempNode.replaceWith(markB); }
            renderSidebar(); saveToLocal(); 
        }

        // --- FUNCIONES PANTALLA COMPLETA NATIVA ---
        function enterFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } 
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }
        function exitFullscreenMode() {
            if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                if (document.exitFullscreen) { document.exitFullscreen(); } 
                else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); } 
                else if (document.msExitFullscreen) { document.msExitFullscreen(); }
            }
        }

        // --- PROMPTER ---
        btnStart.addEventListener('click', () => {
            if (cardsData.length === 0) return;
            enterFullscreen(); // Activamos Fullscreen
            setupView.style.display = 'none'; prompterView.style.display = 'block';
            currentCardIndex = 0; renderPrompterCard();
        });

        document.getElementById('btn-exit-prompter').addEventListener('click', (e) => { e.stopPropagation(); exitPrompter(); });
        document.getElementById('btn-menu-prompter').addEventListener('click', (e) => { e.stopPropagation(); openJumpMenu(); });
        
        // Logica boton de fuente
        document.getElementById('btn-font-prompter').addEventListener('click', (e) => {
            e.stopPropagation();
            fontSliderPanel.style.display = fontSliderPanel.style.display === 'flex' ? 'none' : 'flex';
        });
        prompterView.addEventListener('click', () => { fontSliderPanel.style.display = 'none'; });
        fontSliderPanel.addEventListener('click', (e) => e.stopPropagation());

        function exitPrompter() { 
            exitFullscreenMode(); // Salimos de Fullscreen
            prompterView.style.display = 'none'; setupView.style.display = 'flex'; fontSliderPanel.style.display = 'none';
        }

        function renderPrompterCard() {
            if (cardsData.length === 0) return;
            prompterText.innerText = cardsData[currentCardIndex].text;
            progressIndicator.textContent = `${currentCardIndex + 1} / ${cardsData.length}`;
        }

        prompterText.addEventListener('input', function(e) {
            if (cardsData.length === 0) return;
            const newText = e.target.innerText;
            const currentCard = cardsData[currentCardIndex];
            currentCard.text = newText;
            const textarea = document.querySelector(`textarea[data-id="${currentCard.id}"]`);
            if(textarea) {
                textarea.value = newText;
                textarea.nextElementSibling.querySelector('span').textContent = `${newText.length} car. | ~${calculateReadingTime(newText)}s`;
            }
            const markNode = document.getElementById(`mark-${currentCard.id}`);
            if(markNode) markNode.innerText = newText;
            updateGlobalStats(); saveToLocal(); 
        });

        function nextCard() { if (currentCardIndex < cardsData.length - 1) { currentCardIndex++; renderPrompterCard(); } }
        function prevCard() { if (currentCardIndex > 0) { currentCardIndex--; renderPrompterCard(); } }

        document.getElementById('zone-right').addEventListener('click', nextCard);
        document.getElementById('zone-left').addEventListener('click', prevCard);
        fontSizeSlider.addEventListener('input', (e) => { prompterText.style.fontSize = e.target.value + 'vh'; });

        // --- MENÚ DE SALTO ---
        function openJumpMenu() {
            jumpListContent.innerHTML = ''; 
            cardsData.forEach((card, index) => {
                const item = document.createElement('div'); item.className = 'jump-item';
                const previewText = card.text.length > 60 ? card.text.substring(0, 60) + '...' : card.text;
                item.innerHTML = `<div class="jump-num">${index + 1}.</div><div class="jump-text">${previewText}</div>`;
                item.addEventListener('click', () => { currentCardIndex = index; renderPrompterCard(); closeJumpMenu(); });
                jumpListContent.appendChild(item);
            });
            jumpMenuOverlay.style.display = 'flex'; fontSliderPanel.style.display = 'none';
        }

        function closeJumpMenu() { jumpMenuOverlay.style.display = 'none'; }
        document.getElementById('btn-close-jump').addEventListener('click', closeJumpMenu);
        jumpMenuOverlay.addEventListener('click', (e) => { if(e.target === jumpMenuOverlay) closeJumpMenu(); });

        document.addEventListener('keydown', function(e) {
            if (jumpMenuOverlay.style.display === 'flex') { if (e.key === 'Escape') closeJumpMenu(); return; }
            if (prompterView.style.display !== 'block') return;
            if (document.activeElement === prompterText) { if (e.key === 'Escape') { prompterText.blur(); } return; }

            const nextKeys = ['ArrowRight', 'ArrowDown', 'PageDown'];
            const prevKeys = ['ArrowLeft', 'ArrowUp', 'PageUp'];

            if (nextKeys.includes(e.key)) { e.preventDefault(); nextCard(); }
            else if (prevKeys.includes(e.key)) { e.preventDefault(); prevCard(); }
            else if (e.key === 'Escape') { exitPrompter(); }
        });
    </script>
</body>
</html>
